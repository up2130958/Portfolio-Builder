name: Portfolio-builder
on: push
jobs:
  run-checks:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    - name: setup Node Runtime
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Dep
      run: pnpm install --no-frozen-lockfile

   
    - name: Validate Application Code Build
      env:
          PORT: 3000
          BASE_PATH: PRODUCTION
      run: pnpm run build
    - name: Scan Repository for Security Vulnerabilities
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs' # 'fs' means File System
        format: 'table'
        exit-code: '0' # '0' means log the warnings but don't crash the pipeline yet while we are learning
